name: Nightly

# Two daily jobs against go-syslog:
#   nightly       - build+run a report for develop when it has moved, publish a
#                   timestamped pre-release. A/B-detected reducers among develop's
#                   unclassified options are excluded from the published report.
#   watch-release - A/B-classify unclassified options in the latest release and
#                   file one idempotent issue per option for triage into KNOWN/DENY.
#
# Scheduled develop builds run only when develop has moved (no published asset
# for that SHA). A catalog change or manual dispatch builds unconditionally.
on:
  schedule:
    - cron: '0 6 * * *'
  push:
    branches: [main]
    paths:
      - 'catalog.jsonl'
  workflow_dispatch: {}

concurrency:
  group: nightly
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  nightly:
    name: Nightly develop report
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Resolve go-syslog develop SHA
        id: dev
        run: |
          sha=$(git ls-remote https://github.com/leodido/go-syslog refs/heads/develop | head -1 | cut -c1-12)
          test -n "$sha" || { echo "could not resolve develop sha"; exit 1; }
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "go-syslog develop is at $sha"

      - name: Decide whether to build
        id: gate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "event=${{ github.event_name }}: building unconditionally (catalog change or manual run)"
            echo "build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          asset="report-develop-for-gs-${{ steps.dev.outputs.sha }}"
          if gh api "repos/${GITHUB_REPOSITORY}/releases" --paginate --jq '.[].assets[].name' | grep -Fxq "$asset"; then
            echo "already published $asset; develop has not moved"
            echo "build=false" >> "$GITHUB_OUTPUT"
          else
            echo "build=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build develop binary and run report
        if: steps.gate.outputs.build == 'true'
        run: |
          set -euo pipefail
          ts=$(date -u +%Y%m%d-%H%M%S)
          echo "NIGHTLY_TAG=nightly-$ts" >> "$GITHUB_ENV"

          # Exclude A/B-detected reducers among develop's unclassified options.
          make classify-develop 2>/dev/null > verdicts.jsonl || true
          r3=$(jq -r 'select(.verdict=="reduces" and .pkg=="rfc3164") | .name' verdicts.jsonl | tr '\n' ' ')
          r5=$(jq -r 'select(.verdict=="reduces" and .pkg=="rfc5424") | .name' verdicts.jsonl | tr '\n' ' ')
          [ -n "$r3$r5" ] && echo "excluding detected reducers: 3164=[$r3] 5424=[$r5]"

          make report-develop VERSION="nightly-$ts" EXTRA_DENY_3164="$r3" EXTRA_DENY_5424="$r5"
          bin="bin/report-develop-for-gs-${{ steps.dev.outputs.sha }}"
          test -x "$bin" || { echo "expected $bin was not built (develop may have moved mid-run)"; exit 1; }
          "$bin" -catalog catalog.jsonl > "nightly-report-for-${{ steps.dev.outputs.sha }}.txt"

      - name: Publish nightly pre-release
        if: steps.gate.outputs.build == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${NIGHTLY_TAG}" \
            --title "${NIGHTLY_TAG}" \
            --prerelease \
            --notes "Nightly build against go-syslog develop @ ${{ steps.dev.outputs.sha }}." \
            "bin/report-develop-for-gs-${{ steps.dev.outputs.sha }}" \
            "nightly-report-for-${{ steps.dev.outputs.sha }}.txt"

  watch-release:
    name: Watch latest release for new options
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Classify unclassified options and file issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          make classify-release 2>/dev/null > verdicts.jsonl || true
          rel=$(git -C .lib/go-syslog tag -l 'v*' | sort -V | tail -1)
          bash scripts/file-issues.sh verdicts.jsonl "$rel"
