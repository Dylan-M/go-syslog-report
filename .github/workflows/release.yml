name: Release

# Tag-triggered release. Pushing a v* tag compiles the report binary against
# the latest go-syslog release and attaches it, named for that go-syslog
# version. The binary is self-contained (the catalog is embedded).
on:
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build release binary
        run: make report-release VERSION="${GITHUB_REF_NAME}"

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            bin/report-release-for-gs-*
