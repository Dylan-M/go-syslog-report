name: Release

# Tag-triggered release. Pushing a v* tag compiles the report binary against
# the latest go-syslog release, runs it to produce a report, and attaches both.
# The binary is self-contained (the catalog is embedded).
on:
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build binary and run report
        run: |
          set -euo pipefail
          make report-release VERSION="${GITHUB_REF_NAME}"
          bin=$(ls bin/report-release-for-gs-*)
          echo "REL_BIN=$bin" >> "$GITHUB_ENV"
          echo "REL_TXT=$(basename "$bin").txt" >> "$GITHUB_ENV"
          "$bin" -catalog catalog.jsonl > "$(basename "$bin").txt"

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            "${REL_BIN}" "${REL_TXT}"
